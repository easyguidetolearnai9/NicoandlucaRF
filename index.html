<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nico &amp; Luca RF</title>
  <meta name="description" content="Prime fishing conditions dashboard and 7-day forecast for Key Biscayne with detailed wind, waves, tides, species, and charter planning insights.">

  <link rel="canonical" href="https://nicoandlucarf.com/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Nico &amp; Luca RF">
  <meta property="og:description" content="Prime fishing conditions dashboard and 7-day forecast for Key Biscayne.">
  <meta property="og:url" content="https://nicoandlucarf.com/">
  <meta property="og:image" content="https://nicoandlucarf.com/dashboard-4x-fixed.jpg">
  <meta name="twitter:card" content="summary_large_image">

<body class="home-exact">
  <main class="exact-shell">
    <section id="dashboard-view" class="exact-view is-active" aria-label="Current Conditions Dashboard" style="--scene-image:url('./dashboard-4x-fixed.png');">
      <img class="exact-image" src="./dashboard-4x-fixed.png" alt="Current Conditions Dashboard" fetchpriority="high" decoding="async">
      <div id="live-dashboard-overlay" class="live-overlay live-overlay-dashboard" aria-hidden="true"></div>

      <div class="hotspot-layer">
        <a aria-label='Open dashboard' class='hotspot' data-view-toggle='dashboard' href='/' style='--x:24.5; --y:0.6; --w:11.8; --h:4.8;'></a>
        <a class="hotspot" data-view-toggle="forecast" href="#forecast" style="--x:36.2; --y:0.6; --w:9.8; --h:4.8;" aria-label="Open forecast"></a>
        <a aria-label='Open species' class='hotspot' href='/detail?topic=species-season' style='--x:46.0; --y:0.6; --w:8.8; --h:4.8;'></a>
        <a aria-label='Open charters' class='hotspot' href='/detail?topic=charter-marketplace' style='--x:54.6; --y:0.6; --w:12.8; --h:4.8;'></a>
        <a aria-label='Open profile' class='hotspot' href='/detail?topic=site-guide' style='--x:67.5; --y:0.6; --w:7.8; --h:4.8;'></a>

        <a aria-label='Open wind details' class='hotspot' href='/detail?topic=wind' style='--x:5.4; --y:17.7; --w:20.8; --h:14.5;'></a>
        <a aria-label='Open wave period details' class='hotspot' href='/detail?topic=wave-period' style='--x:5.4; --y:32.2; --w:20.8; --h:14.5;'></a>
        <a aria-label='Open wave height details' class='hotspot' href='/detail?topic=wave-height' style='--x:5.4; --y:46.6; --w:20.8; --h:14.7;'></a>

        <a aria-label='Open score details' class='hotspot' href='/detail?topic=favorable-conditions' style='--x:35.3; --y:14.2; --w:29.5; --h:46.8;'></a>
        <a aria-label='Open optimal fishing window details' class='hotspot' href='/detail?topic=optimal-window' style='--x:72.9; --y:14.2; --w:19.3; --h:14.2;'></a>
        <a aria-label='Open tide and moon details' class='hotspot' href='/detail?topic=tide-phase' style='--x:72.9; --y:30; --w:19.3; --h:31.2;'></a>

        <a aria-label='Open weekly forecast details' class='hotspot' href='/detail?topic=forecast-overview' style='--x:5.4; --y:63.7; --w:30.4; --h:26.8;'></a>
        <a aria-label='Open species and season details' class='hotspot' href='/detail?topic=species-season' style='--x:36.4; --y:63.7; --w:27.3; --h:26.8;'></a>
        <a aria-label='Open charter marketplace details' class='hotspot' href='/detail?topic=charter-marketplace' style='--x:64.9; --y:63.7; --w:26.4; --h:26.8;'></a>
      </div>
    </section>

    <section id="forecast-view" class="exact-view" aria-label="7-Day Prime Fishing Forecast" style="--scene-image:none;" data-scene-image="./reference-4x-fixed.png">
      <img class="exact-image" data-src="./reference-4x-fixed.png" alt="7-Day Prime Fishing Forecast" loading="lazy" decoding="async">
      <img class="dashboard-header-replacement dashboard-header-replacement--forecast" data-src="./dashboard-header-cropped-exact.png" alt="" aria-hidden="true" loading="lazy" decoding="async">
      <div id="live-forecast-overlay" class="live-overlay live-overlay-forecast" aria-hidden="true"></div>

      <div class="hotspot-layer">
        <a aria-label='Open dashboard' class='hotspot' data-view-toggle='dashboard' href='/' style='--x:24.5; --y:0.6; --w:11.8; --h:4.8;'></a>
        <a class="hotspot" data-view-toggle="forecast" href="#forecast" style="--x:36.2; --y:0.6; --w:9.8; --h:4.8;" aria-label="Open forecast"></a>
        <a aria-label='Open species' class='hotspot' href='/detail?topic=species-season' style='--x:46.0; --y:0.6; --w:8.8; --h:4.8;'></a>
        <a aria-label='Open charters' class='hotspot' href='/detail?topic=charter-marketplace' style='--x:54.6; --y:0.6; --w:12.8; --h:4.8;'></a>
        <a aria-label='Open profile' class='hotspot' href='/detail?topic=site-guide' style='--x:67.5; --y:0.6; --w:7.8; --h:4.8;'></a>

        <a aria-label='Open today forecast detail' class='hotspot' href='/detail?topic=forecast-today' style='--x:9.7; --y:11.7; --w:10.7; --h:36.2;'></a>
        <a aria-label='Open Wednesday forecast detail' class='hotspot' href='/detail?topic=forecast-wed' style='--x:20.8; --y:11.7; --w:10.7; --h:36.2;'></a>
        <a aria-label='Open Thursday forecast detail' class='hotspot' href='/detail?topic=forecast-thu' style='--x:31.9; --y:11.7; --w:10.7; --h:36.2;'></a>
        <a aria-label='Open Friday forecast detail' class='hotspot' href='/detail?topic=forecast-fri' style='--x:42.9; --y:11.7; --w:10.7; --h:36.2;'></a>
        <a aria-label='Open Saturday forecast detail' class='hotspot' href='/detail?topic=forecast-sat' style='--x:54.0; --y:11.7; --w:10.7; --h:36.2;'></a>
        <a aria-label='Open Sunday forecast detail' class='hotspot' href='/detail?topic=forecast-sun' style='--x:65.1; --y:11.7; --w:10.7; --h:36.2;'></a>
        <a aria-label='Open Monday forecast detail' class='hotspot' href='/detail?topic=forecast-mon' style='--x:76.1; --y:11.7; --w:10.7; --h:36.2;'></a>

        <a aria-label='Open hourly breakdown details' class='hotspot' href='/detail?topic=hourly-breakdown' style='--x:9.7; --y:50.2; --w:80.5; --h:17.6;'></a>
        <a aria-label='Open water temperature details' class='hotspot' href='/detail?topic=water-temp' style='--x:9.7; --y:70.4; --w:26.6; --h:19.8;'></a>
        <a aria-label='Open tide status details' class='hotspot' href='/detail?topic=tide-status' style='--x:38.3; --y:70.4; --w:26.7; --h:19.8;'></a>
        <a aria-label='Open active species details' class='hotspot' href='/detail?topic=active-species' style='--x:67.0; --y:70.4; --w:25.2; --h:19.8;'></a>
      </div>
    </section>
  </main>

  <script src="./home.js"></script>
  <script src="./score.js"></script>
