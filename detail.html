<body class="detail-page">
  <div class="app-shell">
    <header class="topbar">
      <a class='brand' href='/'>
        <svg class="brand-mark" viewBox="0 0 120 90" aria-hidden="true">
          <defs>
            <linearGradient id="brandStrokeDetail" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#63ecff"></stop>
              <stop offset="100%" stop-color="#98a7ff"></stop>
            </linearGradient>
          </defs>
          <path d="M10 58c16-3 22-26 43-34 11-4 27-4 40 0-13 0-23 7-29 16 14-1 25 3 36 14-14-2-25 1-33 8-7 7-14 15-27 18-11 2-20-3-30-10 12 1 20-1 26-8-10-1-18-5-26-16z" fill="none" stroke="url(#brandStrokeDetail)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M18 52c10 1 16 5 20 11" fill="none" stroke="#6ff5ff" stroke-width="4" stroke-linecap="round"></path>
          <circle cx="74" cy="33" r="4" fill="#9efcff"></circle>
        </svg>
        <span class="brand-text">Nico &amp; Luca RF</span>
      </a>

      <nav class="main-nav" aria-label="Primary">
        <a class='nav-pill' href='/' id='nav-dashboard'>Dashboard</a>
        <a class='nav-pill' href='/#forecast' id='nav-forecast'>Forecast</a>
        <a class='nav-pill' href='/detail?topic=species-season' id='nav-species'>Species</a>
        <a class='nav-pill' href='/detail?topic=charter-marketplace' id='nav-charters'>Marketplace</a>
        <a class='nav-pill' href='/detail?topic=site-guide' id='nav-profile'>Profile</a>
      </nav>

      <form class="search-form" id="search-form">
        <input class="search-input" id="search-input" type="search" placeholder="Search topics..." aria-label="Search topics">
        <button class="search-button" type="submit">Search</button>
      </form>
    </header>

    <main class="page-grid">
      <section class="scene detail-hero">
        <div class="detail-copy">
          <p class="scene-meta" id="topic-eyebrow"></p>
          <h1 id="topic-title"></h1>
          <p class="detail-summary" id="topic-summary"></p>
          <div class="chip-row" id="topic-highlights"></div>
          <div class="page-actions" style="margin-top:20px;">
            <a class='ghost-button' href='/' id='topic-return'>Back To Source View</a>
            <a class='ghost-button' href='/'>Back To Home</a>
          </div>
        </div>

        <div class="detail-preview-wrap">
          <div class="preview-card">
            <h2 class="preview-title">Panel Preview</h2>
            <div class="crop-frame" id="crop-frame">
              <img class="crop-image" id="crop-image" alt="">
            </div>
            <p class="preview-note" id="crop-note"></p>
          </div>
          <div class="preview-card">
            <h2 class="preview-title">Panel Location In View</h2>
            <div class="context-frame">
              <img class="context-image" id="context-image" alt="">
              <div class="context-highlight" id="context-highlight"></div>
            </div>
            <p class="preview-note" id="context-note"></p>
          </div>
        </div>
      </section>

      <section class="insight-grid">
        <article class="scene visual-card">
          <div class="scene-inner">
            <div class="card-head">
              <div class="card-label">Live Visual</div>
              <span class="legend-chip" id="visual-tag">Animated insight</span>
            </div>
            <div class="visual-stage" id="visual-stage"></div>
          </div>
        </article>

        <div class="text-grid" id="topic-sections"></div>
      </section>

      <section class="scene related-panel">
        <div class="scene-inner">
          <div class="card-head">
            <div class="card-label">Related Topics</div>
            <a class='ghost-button' href='/'>Return To Dashboard</a>
          </div>
          <div class="related-grid" id="related-grid"></div>
        </div>
      </section>
      <div class="footer-space"></div>
    </main>
  </div>

  <script src="./topics.js"></script>
  <script src="./detail.js"></script>
</body>
</html>
